{% extends 'layout.html' %}
{% block title %}Register - The Artisan's Touch{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h3 style="margin-top: 0; text-align: center; color: var(--primary-color);">Construct Profile Instance</h3>
    <form action="{{ url_for('register_view') }}" method="POST">
        <div style="margin-bottom: 15px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold;">Identifier Username</label>
            <input type="text" name="username" required style="width:100%; padding:10px; border:1px solid #cbd5e0; border-radius:4px; box-sizing:border-box;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold;">Email Address Destination</label>
            <input type="email" name="email" required style="width:100%; padding:10px; border:1px solid #cbd5e0; border-radius:4px; box-sizing:border-box;">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold;">Security Key Hash</label>
            <input type="password" name="password" required style="width:100%; padding:10px; border:1px solid #cbd5e0; border-radius:4px; box-sizing:border-box;">
        </div>
        <button type="submit" class="btn btn-accent" style="width: 100%; padding: 12px; font-weight: bold; color:#000;">Commit to Database Storage</button>
    </form>
</div>
{% endblock %}
